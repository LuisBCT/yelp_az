resources:
  schemas:
    staging:
      name: staging
      grants:
        - principal: yelpaz_admins
          privileges:
            - USE_SCHEMA
            - SELECT
            - MODIFY
            - REFRESH
            - CREATE_TABLE
            - CREATE_VOLUME
            - WRITE_VOLUME
            - READ_VOLUME
      catalog_name: ${var.catalog}

    bronze:
