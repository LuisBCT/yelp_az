resources:
  external_locations:
    ext_staging_yelpaz:
      name: ext_staging_yelpaz
      url: abfss://staging@styelpaz01.dfs.core.windows.net/
      credential_name: yelpaz-storage-cred
      comment: external credential to yelpaz project for batch workflow - staging
      grants:
        - principal: yelpaz_admins
