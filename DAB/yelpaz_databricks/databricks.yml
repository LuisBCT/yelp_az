# This is a Databricks asset bundle definition for yelpaz_databricks.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: yelpaz_databricks
  uuid: d08f2b1c-4a7a-4c96-baf1-bce754d42ef6

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405617917039953.13.azuredatabricks.net
    variables:
      catalog: yelpaz
      schema: dev
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://adb-7405617917039953.13.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/luis-ct1997@outlook.com to make sure we only have a single copy.
      root_path: /Workspace/Users/luis-ct1997@outlook.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: yelpaz
      schema: prod
    permissions:
      - user_name: luis-ct1997@outlook.com
        level: CAN_MANAGE
