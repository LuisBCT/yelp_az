name: Terraform CD

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      TF_VAR_client_id: ${{ secrets.ARM_CLIENT_ID }}           # convención automática para variables de entorno todas las variables que empiezan con TF_VAR_
      TF_VAR_client_secret: ${{ secrets.ARM_CLIENT_SECRET }}
      TF_VAR_tenant_id: ${{ secrets.ARM_TENANT_ID }}

    steps:
      - uses: actions/checkout@v3
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.14.6
      # ---------- INFRA AZURE ----------
      - name: Terraform Init AZ
        run: terraform init
        working-directory: infra/infra_az

      - name: Terraform Plan AZ
        run: terraform plan -out=tfplan
        working-directory: infra/infra_az

      - name: Terraform Apply AZ
        run: terraform apply -auto-approve tfplan
        working-directory: infra/infra_az


      # ---------- INFRA DATABRICKS ----------
      - name: Terraform Init DB
        run: terraform init
        working-directory: infra/infra_databricks

      - name: Terraform Plan DB
        run: terraform plan -out=tfplan
        working-directory: infra/infra_databricks

      - name: Terraform Apply DB
        run: terraform apply -auto-approve tfplan
        working-directory: infra/infra_databricks